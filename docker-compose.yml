services:
  credential-proxy:
    build:
      context: credential-proxy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FASTMAIL_API_TOKEN=${FASTMAIL_API_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
    networks:
      - internal
    restart: unless-stopped
    # Hardening (local dev only; Fly.io uses its own isolation)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Caddy needs this for listening
      - SETUID     # su-exec needs these to switch users for sidecar
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /data:size=64M    # Caddy runtime state (TLS certs, etc.)
      - /config:size=16M  # Caddy config directory
      - /tmp:size=16M

  log-service:
    build:
      context: log-service
    ports:
      - "8081:8081"
    environment:
      - LOG_FILE=/data/agent.jsonl
    volumes:
      - log-data:/data
    networks:
      - internal
    restart: unless-stopped
    # Hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN      # start.sh chowns /data before dropping privileges
      - SETUID     # gosu needs these to drop from root to appuser
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:size=16M

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CRED_PROXY_BASE=http://credential-proxy:8080
      - LOG_SERVICE_URL=http://log-service:8081/log
      - ZULIP_SITE=${ZULIP_SITE}
      - ZULIP_EMAIL=${ZULIP_EMAIL}
      - ZULIP_API_KEY=${ZULIP_API_KEY}
      - ZULIP_STREAMS=${ZULIP_STREAMS}
      - ZULIP_ALLOW_FROM=${ZULIP_ALLOW_FROM}
      - AGENT_MODE=${AGENT_MODE}
      - EMAIL_SUBSCRIPTIONS_FILE=${EMAIL_SUBSCRIPTIONS_FILE}
      - RATE_LIMIT_TPM=${RATE_LIMIT_TPM}
      - LOG_FILE=${LOG_FILE}
    volumes:
      - agent-data:/data/nanobot
    depends_on:
      - log-service
      - credential-proxy
    networks:
      - internal
    restart: unless-stopped
    # Hardening — agent processes untrusted input, so lock it down tightly
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /home/appuser/.cache:size=128M,uid=1000,gid=1000  # uv needs a writable cache dir

networks:
  internal:
    driver: bridge

volumes:
  log-data:
  agent-data:
