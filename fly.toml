app = "polynumeral-assistant"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  LOG_SERVICE_URL = "http://polynumeral-log.flycast:8081/log"
  AGENT_MODE = "zulip"
  CRED_PROXY_BASE = "http://polynumeral-cred-proxy.flycast:8080"

[mounts]
  source = "agent_data"
  destination = "/data"
  # Persistent state: /data/nanobot/ — JSONL sessions, MEMORY.md, HISTORY.md
  # Fly takes daily snapshots, retained 5 days.

[[vm]]
  size = "shared-cpu-2x"
  memory = 2048
